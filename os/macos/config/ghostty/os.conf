# macOS-only ghostty overrides. Included from ../config via `config-file = ?os.conf`.

# Launch Homebrew fish as a login + interactive shell. The absolute path is
# required: ghostty launched from the Dock/Finder inherits a minimal PATH that
# does not include /opt/homebrew/bin, so a bare `fish` would not resolve.
command = /opt/homebrew/bin/fish --login --interactive
