# XDG base directories + per-tool redirects, exported to the entire systemd
# user session (GUI apps, daemons, and every shell) at login.
#
# Mirror of config/shell/xdg-env.sh and config/fish/conf.d/xdg.fish, minus the
# PATH logic (that stays in the shells). KEEP THE THREE IN SYNC.
# Linux/systemd only; takes effect after the next logout/login.

XDG_CONFIG_HOME=${XDG_CONFIG_HOME:-${HOME}/.config}
XDG_DATA_HOME=${XDG_DATA_HOME:-${HOME}/.local/share}
XDG_STATE_HOME=${XDG_STATE_HOME:-${HOME}/.local/state}
XDG_CACHE_HOME=${XDG_CACHE_HOME:-${HOME}/.cache}

# node / python REPL history
NODE_REPL_HISTORY=${XDG_STATE_HOME}/node/repl_history
PYTHON_HISTORY=${XDG_STATE_HOME}/python/history

# redis-cli / psql history
REDISCLI_HISTFILE=${XDG_DATA_HOME}/redis/rediscli_history
PSQL_HISTORY=${XDG_STATE_HOME}/psql/history

# wget (points at the XDG wgetrc that relocates the HSTS database)
WGETRC=${XDG_CONFIG_HOME}/wget/wgetrc

# ipython / jupyter
IPYTHONDIR=${XDG_CONFIG_HOME}/ipython
JUPYTER_PLATFORM_DIRS=1

# npm
NPM_CONFIG_CACHE=${XDG_CACHE_HOME}/npm
NPM_CONFIG_USERCONFIG=${XDG_CONFIG_HOME}/npm/npmrc

# dotnet
DOTNET_CLI_HOME=${XDG_DATA_HOME}/dotnet

# rust / go
CARGO_HOME=${XDG_DATA_HOME}/cargo
RUSTUP_HOME=${XDG_DATA_HOME}/rustup
GOPATH=${XDG_DATA_HOME}/go

# less
LESSHISTFILE=${XDG_STATE_HOME}/less/history

# azure cli
AZURE_CONFIG_DIR=${XDG_CONFIG_HOME}/azure

# aws cli
AWS_CONFIG_FILE=${XDG_CONFIG_HOME}/aws/config
AWS_SHARED_CREDENTIALS_FILE=${XDG_CONFIG_HOME}/aws/credentials

# pm2
PM2_HOME=${XDG_DATA_HOME}/pm2

# ollama
OLLAMA_MODELS=${XDG_DATA_HOME}/ollama/models
